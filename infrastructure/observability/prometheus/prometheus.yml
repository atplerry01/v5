global:
  scrape_interval: 5s

# R4.A — canonical alert-rule package. `rules/*.yml` is discovered via the
# glob; each file under rules/ is a named group aligned to the canonical
# runtime posture + lifecycle vocabulary (see infrastructure.guard.md §R4.A
# Observability Packaging for the locked coverage expectation).
rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'whycespace-api'
    static_configs:
      - targets: ['foundation-host:5000']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
