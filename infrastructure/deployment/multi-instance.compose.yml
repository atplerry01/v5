# phase1.5-S5.5 / Stage A — multi-instance compose extension.
#
# Designed to be applied as an OVERLAY on top of the base
# docker-compose.yml so all the existing infrastructure services
# (postgres, postgres-projections, whycechain-db, kafka, redis, opa,
# observability stack) are reused unchanged. The only additions are:
#
#   1. postgres-extra-migrations  — one-shot init container that
#      applies the outbox + hsid + chain SQL the base compose does
#      not auto-mount. Idempotent (CREATE TABLE IF NOT EXISTS).
#   2. whyce-host-1, whyce-host-2 — two Whycespace.Host instances
#      built from the repo via Dockerfile.host, sharing the
#      infrastructure stack.
#   3. whyce-edge                 — nginx round-robin front door
#      that distributes traffic across both hosts. Used by Stage B+
#      test drivers to drive concurrent multi-instance load.
#
# USAGE (from infrastructure/deployment/):
#
#   docker compose \
#     -f docker-compose.yml \
#     -f multi-instance.compose.yml \
#     up -d
#
# The build context is the REPO ROOT (../..) so Dockerfile.host can
# COPY src/ directly.

services:
  # ─── One-shot migration runner ─────────────────────────────────────
  # Runs after both databases are healthy, applies the migrations the
  # base compose does not auto-mount, then exits. Compose treats a
  # successful exit as `service_completed_successfully`, which the
  # host services depend on so they cannot start before the schema
  # is ready.
  postgres-extra-migrations:
    image: postgres:15
    container_name: whyce-postgres-extra-migrations
    depends_on:
      postgres:
        condition: service_healthy
      whycechain-db:
        condition: service_healthy
    volumes:
      - ../data/postgres:/migrations:ro
      - ./multi-instance/apply-extra-migrations.sh:/apply.sh:ro
    entrypoint: ["/bin/bash", "/apply.sh"]
    networks:
      - whyce-network

  # ─── Host instance 1 ───────────────────────────────────────────────
  whyce-host-1:
    build:
      context: ../..
      dockerfile: infrastructure/deployment/Dockerfile.host
    image: whycespace-host:phase1.5-s5.5
    container_name: whyce-host-1
    hostname: whyce-host-1
    depends_on:
      postgres:
        condition: service_healthy
      postgres-projections:
        condition: service_healthy
      whycechain-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      minio:
        condition: service_started
      postgres-extra-migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      # Connection strings — use service-name DNS inside the compose network.
      Postgres__ConnectionString: "Host=postgres;Port=5432;Database=whyce_eventstore;Username=whyce;Password=whyce"
      Postgres__ChainConnectionString: "Host=whycechain-db;Port=5432;Database=whycechain;Username=whyce;Password=whyce"
      Postgres__ProjectionsConnectionString: "Host=postgres-projections;Port=5432;Database=whyce_projections;Username=whyce;Password=whyce"
      # phase1.5-S5.5 / Stage B: TodoController reads `Projections:ConnectionString`
      # (a DIFFERENT config key from `Postgres:ProjectionsConnectionString` —
      # see InfrastructureComposition.cs line 43-50 acknowledging the seam).
      # Both must be supplied; same physical DB.
      Projections__ConnectionString: "Host=postgres-projections;Port=5432;Database=whyce_projections;Username=whyce;Password=whyce"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
      OPA__Endpoint: "http://opa:8181"
      # phase1.5-S5.5 / Stage A: MinIO config keys are required by
      # ObservabilityComposition (chain-store snapshot bucket). Values
      # match the base compose minio service env.
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "whyce"
      MinIO__SecretKey: "whycepassword"
      # Identifier so log lines + readiness payloads can attribute back
      # to a specific host instance. Picked up by ASPNETCORE_HOSTNAME and
      # surfaces in standard ASP.NET logging.
      DOTNET_HOSTNAME: "whyce-host-1"
    ports:
      # Direct per-host access for evidence capture (the front door is
      # on a separate port). Host port 18081 → container 8080.
      - "18081:8080"
    networks:
      - whyce-network
    healthcheck:
      # bash /dev/tcp probe — see Dockerfile.host runtime stage comment
      # for why we do not use curl here.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # ─── Host instance 2 ───────────────────────────────────────────────
  whyce-host-2:
    build:
      context: ../..
      dockerfile: infrastructure/deployment/Dockerfile.host
    image: whycespace-host:phase1.5-s5.5
    container_name: whyce-host-2
    hostname: whyce-host-2
    depends_on:
      postgres:
        condition: service_healthy
      postgres-projections:
        condition: service_healthy
      whycechain-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      minio:
        condition: service_started
      postgres-extra-migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Postgres__ConnectionString: "Host=postgres;Port=5432;Database=whyce_eventstore;Username=whyce;Password=whyce"
      Postgres__ChainConnectionString: "Host=whycechain-db;Port=5432;Database=whycechain;Username=whyce;Password=whyce"
      Postgres__ProjectionsConnectionString: "Host=postgres-projections;Port=5432;Database=whyce_projections;Username=whyce;Password=whyce"
      # phase1.5-S5.5 / Stage B: TodoController reads `Projections:ConnectionString`
      # (a DIFFERENT config key from `Postgres:ProjectionsConnectionString` —
      # see InfrastructureComposition.cs line 43-50 acknowledging the seam).
      # Both must be supplied; same physical DB.
      Projections__ConnectionString: "Host=postgres-projections;Port=5432;Database=whyce_projections;Username=whyce;Password=whyce"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
      OPA__Endpoint: "http://opa:8181"
      # phase1.5-S5.5 / Stage A: MinIO config keys are required by
      # ObservabilityComposition (chain-store snapshot bucket). Values
      # match the base compose minio service env.
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "whyce"
      MinIO__SecretKey: "whycepassword"
      DOTNET_HOSTNAME: "whyce-host-2"
    ports:
      - "18082:8080"
    networks:
      - whyce-network
    healthcheck:
      # bash /dev/tcp probe — see Dockerfile.host runtime stage comment
      # for why we do not use curl here.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # ─── Front door ────────────────────────────────────────────────────
  whyce-edge:
    image: nginx:1.27-alpine
    container_name: whyce-edge
    depends_on:
      whyce-host-1:
        condition: service_healthy
      whyce-host-2:
        condition: service_healthy
    volumes:
      - ./multi-instance/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      # Front door on host port 18080. Round-robins to both hosts.
      - "18080:8080"
    networks:
      - whyce-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
