networks:
  whyce-network:
    driver: bridge

services:

  # ── Core Infrastructure ──

  kafka:
    image: apache/kafka:3.9.0
    container_name: whyce-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "whyce-kafka-kraft-local"
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_NUM_NETWORK_THREADS: 6
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_NUM_PARTITIONS: 12
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - whyce-network

  postgres:
    image: postgres:15
    container_name: whyce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whyce_eventstore
      POSTGRES_USER: whyce
      POSTGRES_PASSWORD: whyce
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data/postgres/event-store/migrations:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "1.0"
          memory: 512M
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whyce -d whyce_eventstore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - whyce-network

  postgres-projections:
    image: postgres:15
    container_name: whyce-postgres-projections
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: whyce_projections
      POSTGRES_USER: whyce
      POSTGRES_PASSWORD: whyce
    volumes:
      - projections_data:/var/lib/postgresql/data
      - ../data/postgres/projections:/docker-entrypoint-initdb.d/projections:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whyce -d whyce_projections"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - whyce-network

  redis:
    image: redis:7
    container_name: whyce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - whyce-network

  opa:
    image: openpolicyagent/opa:latest
    container_name: whyce-opa
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "/policies/base", "/policies/domain"]
    ports:
      - "8181:8181"
    volumes:
      - opa_data:/data
      - ../policy/base:/policies/base:ro
      - ../policy/domain:/policies/domain:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "-f", "json", "true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - whyce-network

  prometheus:
    image: prom/prometheus
    container_name: whyce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - whyce-network

  # ── Exporters ──

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: whyce-kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - whyce-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: whyce-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://whyce:whyce@postgres:5432/whyce_eventstore?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - whyce-network

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: whyce-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - whyce-network

  node-exporter:
    image: prom/node-exporter
    container_name: whyce-node-exporter
    ports:
      - "9100:9100"
    networks:
      - whyce-network

  # ── UI Services ──

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: whyce-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: whyce-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - whyce-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whyce-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@whycespace.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - whyce-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: whyce-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - whyce-network

  grafana:
    image: grafana/grafana:latest
    container_name: whyce-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - whyce-network

  # ── WhyceChain Ledger ──

  whycechain-db:
    image: postgres:15
    container_name: whyce-whycechain-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: whycechain
      POSTGRES_USER: whyce
      POSTGRES_PASSWORD: whyce
    volumes:
      - whycechain_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whyce -d whycechain"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - whyce-network

  # ── Object Storage ──

  minio:
    image: minio/minio
    container_name: whyce-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: whyce
      MINIO_ROOT_PASSWORD: whycepassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - whyce-network

  minio-init:
    image: minio/mc
    container_name: whyce-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    volumes:
      - ../data/minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ROOT_USER: whyce
      MINIO_ROOT_PASSWORD: whycepassword
    networks:
      - whyce-network

  # ── Init Services ──

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: whyce-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ../event-fabric/kafka/create-topics.sh:/create-topics.sh:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - whyce-network

volumes:
  kafka_data:
  postgres_data:
  projections_data:
  redis_data:
  opa_data:
  minio_data:
  whycechain_data:
  prometheus_data:
  pgadmin_data:
  redisinsight_data:
  grafana_data:
