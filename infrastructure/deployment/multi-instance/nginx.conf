# phase1.5-S5.5 / Stage A — nginx front door for the multi-instance
# host topology.
#
# Round-robins traffic across whyce-host-1 and whyce-host-2. Health
# checks use the host's /live endpoint (process-aliveness only, no
# dependency wait — see HealthController.cs:84). The /health,
# /health/ping, /live, /ready, and /api/* paths are all forwarded
# unchanged.
#
# Listening on 8080 inside the container; the compose file maps that
# to a host port so the test driver can probe from the host machine.

events {
    worker_connections 1024;
}

http {
    upstream whyce_hosts {
        # Default round-robin. max_fails + fail_timeout cause a host
        # marked unhealthy by /live to be skipped briefly.
        server whyce-host-1:8080 max_fails=3 fail_timeout=5s;
        server whyce-host-2:8080 max_fails=3 fail_timeout=5s;
    }

    # Custom log format that records which upstream actually served the
    # request — used by Stage A evidence capture to prove load balancing
    # actually distributed traffic across both hosts.
    log_format upstream_trace '$remote_addr - $upstream_addr [$time_local] '
                              '"$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log upstream_trace;

    server {
        listen 8080;

        location / {
            proxy_pass         http://whyce_hosts;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
